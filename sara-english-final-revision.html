<title>Sara's English Quiz – Top Goal 1 (2nd Term)</title>
<style>
:root{--purple:#6c5ce7;--green:#2ecc71;--red:#e74c3c;--yellow:#ffd93d;--blue:#4ab3ff;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Comic Sans MS','Segoe UI',sans-serif;background:linear-gradient(160deg,#a8e6ff,#d6c8ff);min-height:100vh;color:#333;}
.wrap{max-width:680px;margin:0 auto;padding:14px;}
header{text-align:center;color:#fff;padding:10px 0 4px;}
header h1{margin:.2em 0;font-size:1.5em;text-shadow:2px 2px 0 #6c5ce7;color:#fff;}
header p{margin:.2em 0;color:#4834a3;font-weight:bold;}
.bar{background:#fff;border-radius:30px;height:18px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.15);margin:8px 0;}
.bar > div{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .4s;}
.stats{display:flex;justify-content:space-between;font-weight:bold;color:#4834a3;font-size:.95em;margin-bottom:6px;}
.card{background:#fff;border-radius:22px;padding:20px;box-shadow:0 8px 22px rgba(80,60,160,.18);animation:pop .3s;}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.sec{display:inline-block;background:var(--yellow);color:#7a5c00;padding:3px 12px;border-radius:20px;font-size:.8em;font-weight:bold;margin-bottom:10px;}
.qtext{font-size:1.2em;margin:6px 0 14px;font-weight:bold;color:#2d2d6a;}
.qimg{display:block;max-width:200px;max-height:150px;margin:0 auto 14px;border-radius:14px;}
.opt{display:block;width:100%;text-align:left;margin:8px 0;padding:13px 16px;border:3px solid #d9d2ff;background:#f6f4ff;border-radius:16px;font-size:1.05em;cursor:pointer;transition:.15s;font-family:inherit;}
.opt:hover{border-color:var(--purple);transform:translateY(-2px);}
.opt.correct{background:var(--green);border-color:#27ae60;color:#fff;}
.opt.wrong{background:var(--red);border-color:#c0392b;color:#fff;}
.opt:disabled{cursor:default;}
.tfrow{display:flex;gap:12px;}
.tfrow .opt{text-align:center;font-size:1.2em;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0;}
.chip{padding:10px 14px;border-radius:14px;border:3px solid var(--blue);background:#eaf6ff;cursor:pointer;font-size:1.05em;font-family:inherit;}
.chip:hover{background:#d2ecff;}
.chip.used{opacity:.35;pointer-events:none;}
.slot{min-height:46px;border:3px dashed #b9a8ff;border-radius:14px;padding:8px;margin:8px 0;display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:#faf8ff;}
.slot .chip{border-color:var(--purple);background:#efeaff;}
.fillline{font-size:1.15em;margin:10px 0;color:#2d2d6a;}
.blank{display:inline-block;min-width:90px;border-bottom:3px solid var(--purple);text-align:center;color:var(--green);font-weight:bold;}
input.spell{font-family:inherit;font-size:1.2em;padding:10px 14px;border:3px solid var(--blue);border-radius:14px;width:70%;text-align:center;}
.btn{display:inline-block;margin-top:14px;padding:12px 26px;border:none;border-radius:30px;background:var(--purple);color:#fff;font-size:1.05em;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #4834a3;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #4834a3;}
.btn.green{background:var(--green);box-shadow:0 4px 0 #1e8e4e;}
.fb{margin-top:12px;font-weight:bold;font-size:1.1em;min-height:24px;}
.fb.ok{color:#1e8e4e;}.fb.no{color:#c0392b;}
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mimg{border:3px solid #d9d2ff;border-radius:14px;padding:6px;text-align:center;cursor:pointer;background:#f6f4ff;}
.mimg img{max-height:70px;max-width:100%;}
.mimg.sel{border-color:var(--purple);background:#efeaff;}
.mimg.done{border-color:var(--green);background:#eafff1;}
.mimg .tag{display:block;font-size:.85em;font-weight:bold;color:var(--green);min-height:18px;}
.mwords{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px;}
#end{text-align:center;}
#end .score{font-size:2.6em;color:var(--purple);font-weight:bold;}
.confetti{font-size:3em;}
</style></head><body>

let i=0, score=0, answered=false;
const app=document.getElementById('app');
const norm=s=>s.toLowerCase().replace(/[^a-z']/g,'').trim();

function next(){ i++; answered=false; if(i>=Q.length) return end(); render(); }
function upd(){ document.getElementById('prog').textContent='Question '+(i+1)+' / '+Q.length;
  document.getElementById('scoreLbl').textContent='⭐ '+score;
  document.getElementById('barfill').style.width=(i/Q.length*100)+'%'; }

function feedback(parent, ok, msg){ const f=document.createElement('div');
  f.className='fb '+(ok?'ok':'no'); f.textContent=(ok?'🎉 ':'💡 ')+msg; parent.appendChild(f);
  const b=document.createElement('button'); b.className='btn green'; b.textContent=(i==Q.length-1?'See my score! 🏆':'Next ➜');
  b.onclick=next; parent.appendChild(b); }

function render(){ upd(); const q=Q[i]; const c=document.createElement('div'); c.className='card';
  c.innerHTML='<span class="sec">'+q.sec+'</span>'; app.innerHTML=''; app.appendChild(c);
  ({mcq:rMcq,tf:rTf,fill:rFill,order:rOrder,spell:rSpell,match:rMatch})[q.type](c,q);
}

function rMcq(c,q){ c.insertAdjacentHTML('beforeend','<div class="qtext">'+q.q+'</div>');
  q.opts.forEach((o,k)=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=o;
    b.onclick=()=>{ if(answered)return; answered=true;
      [...c.querySelectorAll('.opt')].forEach(x=>x.disabled=true);
      if(k===q.ans){ b.classList.add('correct'); score++; feedback(c,true,'Correct!'); }
      else{ b.classList.add('wrong'); c.querySelectorAll('.opt')[q.ans].classList.add('correct');
        feedback(c,false,'The answer is: '+q.opts[q.ans]); } upd(); };
    c.appendChild(b); }); }

function rTf(c,q){ if(q.img)c.insertAdjacentHTML('beforeend','<img class="qimg" src="'+q.img+'">');
  c.insertAdjacentHTML('beforeend','<div class="qtext">'+q.q+'</div>');
  const row=document.createElement('div'); row.className='tfrow';
  [['True',true],['False',false]].forEach(([t,v])=>{ const b=document.createElement('button');
    b.className='opt'; b.textContent=t;
    b.onclick=()=>{ if(answered)return; answered=true;
      [...row.querySelectorAll('.opt')].forEach(x=>x.disabled=true);
      if(v===q.ans){ b.classList.add('correct'); score++; feedback(c,true,'Correct!'); }
      else{ b.classList.add('wrong'); feedback(c,false,'The answer is '+(q.ans?'True':'False')); } upd(); };
    row.appendChild(b); }); c.appendChild(row); }

function rFill(c,q){ if(q.img)c.insertAdjacentHTML('beforeend','<img class="qimg" src="'+q.img+'">');
  const line=document.createElement('div'); line.className='fillline';
  line.innerHTML=q.before+' <span class="blank" id="bk">_____</span> '+q.after; c.appendChild(line);
  const chips=document.createElement('div'); chips.className='chips';
  q.bank.forEach(w=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=w;
    b.onclick=()=>{ if(answered)return; answered=true;
      [...chips.querySelectorAll('.chip')].forEach(x=>x.classList.add('used'));
      document.getElementById('bk').textContent=w;
      if(w===q.ans){ score++; feedback(c,true,'Correct!'); }
      else{ document.getElementById('bk').style.color='#c0392b';
        feedback(c,false,'The answer is: '+q.ans); } upd(); };
    chips.appendChild(b); }); c.appendChild(chips); }

function rOrder(c,q){ c.insertAdjacentHTML('beforeend','<div class="qtext">Put the words in order:</div>');
  c.insertAdjacentHTML('beforeend','<div style="color:#888;margin-bottom:6px">'+q.q+'</div>');
  const slot=document.createElement('div'); slot.className='slot'; slot.id='slot';
  const pool=document.createElement('div'); pool.className='chips';
  const order=[];
  const shuffled=[...q.words].map((w,idx)=>({w,idx})).sort(()=>Math.random()-.5);
  shuffled.forEach(o=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=o.w;
    b.onclick=()=>{ if(answered)return; b.classList.add('used'); order.push(o.w);
      const s=document.createElement('span'); s.className='chip'; s.textContent=o.w; slot.appendChild(s); };
    pool.appendChild(b); });
  c.appendChild(slot); c.appendChild(pool);
  const check=document.createElement('button'); check.className='btn'; check.textContent='Check ✔';
  check.onclick=()=>{ if(answered)return; answered=true;
    const got=order.join(' ').replace(/\s+\./,'.').toLowerCase().replace(/[^a-z' ]/g,'').trim();
    const want=q.ans.toLowerCase().replace(/[^a-z' ]/g,'').trim();
    if(got===want){ score++; feedback(c,true,'Correct!'); }
    else feedback(c,false,'The answer is: '+q.ans); upd(); };
  c.appendChild(check);
  const reset=document.createElement('button'); reset.className='btn'; reset.style.marginLeft='8px';
  reset.style.background='#aaa'; reset.style.boxShadow='0 4px 0 #888'; reset.textContent='↺ Reset';
  reset.onclick=()=>{ if(answered)return; order.length=0; slot.innerHTML='';
    [...pool.querySelectorAll('.chip')].forEach(x=>x.classList.remove('used')); };
  c.appendChild(reset); }

function rSpell(c,q){ c.insertAdjacentHTML('beforeend','<img class="qimg" src="'+q.img+'">');
  c.insertAdjacentHTML('beforeend','<div class="qtext">Spell the word:</div>');
  const inp=document.createElement('input'); inp.className='spell'; inp.placeholder='type here...';
  inp.autocomplete='off'; c.appendChild(inp);
  const check=document.createElement('button'); check.className='btn'; check.style.marginLeft='8px';
  check.textContent='Check ✔';
  const go=()=>{ if(answered)return; answered=true; inp.disabled=true;
    if(norm(inp.value)===norm(q.ans)){ score++; inp.style.borderColor='#2ecc71'; feedback(c,true,'Correct!'); }
    else{ inp.style.borderColor='#e74c3c'; feedback(c,false,'The word is: '+q.ans); } upd(); };
  check.onclick=go; inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  c.appendChild(check); inp.focus(); }

function rMatch(c,q){ c.insertAdjacentHTML('beforeend','<div class="qtext">Tap a picture, then tap its word!</div>');
  const grid=document.createElement('div'); grid.className='matchgrid';
  const words=document.createElement('div'); words.className='mwords';
  let sel=null, done=0; const total=q.pairs.length;
  const labels=[...q.pairs.map(p=>p.lbl)].sort(()=>Math.random()-.5);
  q.pairs.forEach((p,k)=>{ const d=document.createElement('div'); d.className='mimg'; d.dataset.lbl=p.lbl;
    d.innerHTML='<img src="'+p.img+'"><span class="tag"></span>';
    d.onclick=()=>{ if(d.classList.contains('done'))return;
      grid.querySelectorAll('.mimg').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); sel=d; };
    grid.appendChild(d); });
  labels.forEach(l=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=l;
    b.onclick=()=>{ if(!sel||answered)return;
      if(sel.dataset.lbl===l){ sel.classList.remove('sel'); sel.classList.add('done');
        sel.querySelector('.tag').textContent='✓ '+l; b.classList.add('used'); done++; sel=null;
        if(done===total){ answered=true; score++; upd(); feedback(c,true,'All matched! Great job!'); } }
      else{ const s=sel; s.style.borderColor='#e74c3c'; setTimeout(()=>{if(!s.classList.contains('done'))s.style.borderColor='';},500); } };
    words.appendChild(b); });
  c.appendChild(grid); c.appendChild(words); }

function end(){ document.querySelector('.stats').style.display='none';
  document.getElementById('barfill').style.width='100%';
  const pct=Math.round(score/Q.length*100);
  let msg = pct>=90?'Outstanding! 🏆':pct>=70?'Great work! 🌟':pct>=50?'Good job! 👍':'Keep practicing! 💪';
  app.innerHTML='<div class="card" id="end"><div class="confetti">🎉🎈🎊</div>'+
    '<h2>Well done, Sara!</h2><div class="score">'+score+' / '+Q.length+'</div>'+
    '<p style="font-size:1.3em;color:#4834a3">'+pct+'% — '+msg+'</p>'+
    '<button class="btn green" onclick="restart()">Play again ↺</button></div>'; }
function restart(){ i=0;score=0;answered=false; document.querySelector('.stats').style.display='flex'; render(); }
render();
</script></body></html>
